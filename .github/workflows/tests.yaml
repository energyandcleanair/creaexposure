name: Tests

on:
  push:
    branches: [ master, feat/new_exposure_folder_structure ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  testthat:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/energyandcleanair/creaexposure/ci-image:${{ github.ref_name }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        GIS_DIR: /work/gis
        CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Check GIS data availability
        run: |
          if [ -d "$GIS_DIR/concentration" ]; then
            echo "GIS concentration data found in CI image:"
            find $GIS_DIR/concentration -type f | head -20
          else
            echo "No concentration data in CI image — tests requiring data will skip"
          fi

      - name: Install dependencies (no upgrade)
        run: |
          Rscript -e 'pak::local_install_deps(".", ask = FALSE, upgrade = FALSE)'

      - name: Run tests
        run: |
          Rscript -e 'devtools::test(stop_on_failure = TRUE)'
