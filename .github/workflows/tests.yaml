name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  resolve-image:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute Docker-safe tag from branch name
        id: tag
        run: |
          # Replace / with - to make a valid Docker tag (e.g. feat/foo -> feat-foo)
          TAG=$(echo "${{ github.ref_name }}" | sed 's|/|-|g')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  testthat:
    needs: resolve-image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/energyandcleanair/creaexposure/ci-image:${{ needs.resolve-image.outputs.tag }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        GIS_DIR: /work/gis
        CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Check GIS data availability
        run: |
          if [ -d "$GIS_DIR/concentration" ]; then
            echo "GIS concentration data found in CI image:"
            find $GIS_DIR/concentration -type f | head -20
          else
            echo "No concentration data in CI image — tests requiring data will skip"
          fi

      - name: Install dependencies (no upgrade)
        run: |
          Rscript -e 'pak::local_install_deps(".", ask = FALSE, upgrade = FALSE)'

      - name: Run tests
        run: |
          Rscript -e 'devtools::test(stop_on_failure = TRUE)'
